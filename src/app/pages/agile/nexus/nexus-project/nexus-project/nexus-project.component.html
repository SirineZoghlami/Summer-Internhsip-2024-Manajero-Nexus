<div class="container">
    <form #projectForm="ngForm" (ngSubmit)="saveProject(projectForm)">
      <div class="form-group">
        <label for="projectName">Project Name</label>
        <input 
          type="text" 
          id="projectName" 
          name="projectName" 
          [(ngModel)]="newProject.projectName" 
          placeholder="Project Name" 
          required
        />
      </div>
  
      <div class="form-group">
        <label for="description">Description</label>
        <textarea 
          id="description" 
          name="description" 
          [(ngModel)]="newProject.description" 
          placeholder="Description" 
          required
        ></textarea>
      </div>
  
      <div class="form-group">
        <label for="startDate">Start Date</label>
        <input 
          type="date" 
          id="startDate" 
          name="startDate" 
          [(ngModel)]="newProject.startDate" 
          placeholder="Start Date" 
          required
        />
      </div>
  
      <div class="form-group">
        <label for="endDate">End Date</label>
        <input 
          type="date" 
          id="endDate" 
          name="endDate" 
          [(ngModel)]="newProject.endDate" 
          placeholder="End Date" 
          required
        />
      </div>
  
      <div class="button-container">
        <button type="submit" nbButton status="success">Save Project</button>
      </div>
    </form>
  </div>
