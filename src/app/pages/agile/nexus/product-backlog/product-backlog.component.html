<nb-card>
    <nb-card-header>
      <div class="header-content">
        Product Backlog
        <button class="add-backlog-button" (click)="openCreateModal()">+</button>
      </div>
    </nb-card-header>
    <nb-card-body>
      <form *ngIf="showForm" (ngSubmit)="onSubmit()">
        <nb-card>
          <nb-card-header>
            <h2>Create Product Backlog Item</h2>
          </nb-card-header>
          <nb-card-body>
            <div class="form-group">
              <label for="title">Title</label>
              <input nbInput fullWidth id="title" [(ngModel)]="backlogItem.title" name="title" required />
            </div>
            <div class="form-group">
              <label for="description">Description</label>
              <textarea nbInput fullWidth id="description" [(ngModel)]="backlogItem.description" name="description" required></textarea>
            </div>
            <div class="form-group">
              <label for="priority">Priority</label>
              <nb-select fullWidth id="priority" [(ngModel)]="backlogItem.priority" name="priority" required>
                <nb-option *ngFor="let priority of priorities" [value]="priority">{{ priority }}</nb-option>
              </nb-select>
            </div>
            <div class="form-group">
              <label for="status">Status</label>
              <nb-select fullWidth id="status" [(ngModel)]="backlogItem.status" name="status" required>
                <nb-option *ngFor="let status of statuses" [value]="status">{{ status }}</nb-option>
              </nb-select>
            </div>
            <button nbButton status="success" type="submit">save</button>
          </nb-card-body>
        </nb-card>
      </form>
  
      <div class="backlog-list-container">
        <div class="backlog-item" *ngFor="let item of backlogItems" [ngClass]="getPriorityClass(item.priority)">
          <div class="item-content">
            <span class="item-title">{{ item.title }}</span>
            <span class="item-status">{{ item.status }}</span>
            <span class="priority-label">{{ item.priority }}</span>
          </div>
          <div class="item-actions">
            <button nbButton size="small" status="info" (click)="openEditModal(item)">Edit</button>
            <button nbButton size="small" status="danger" (click)="confirmDelete(item.id)">Delete</button>
          </div>
        </div>
      </div>
    </nb-card-body>
  </nb-card>
