<div class="modal-content">
  <h2>Create New Team</h2>
  <form (ngSubmit)="createTeam()">
    <div class="form-group">
      <label for="teamName">Name:</label>
      <input
        id="teamName"
        type="text"
        [(ngModel)]="teamName"
        name="name"
        required
        placeholder="Enter team name"
      />
    </div>

    <div class="form-group">
      <label for="teamMembers">Members (comma-separated):</label>
      <input
        id="teamMembers"
        type="text"
        [(ngModel)]="teamMembers"
        name="members"
        required
        placeholder="Enter members separated by commas"
      />
    </div>

    <div class="form-group">
      <label for="teamRoles">Roles (comma-separated):</label>
      <input
        id="teamRoles"
        type="text"
        [(ngModel)]="teamRoles"
        name="roles"
        required
        placeholder="Enter roles separated by commas"
      />
    </div>

    <div class="form-buttons">
      <button type="button" (click)="cancel()">Cancel</button>
      <button type="submit">Create Team</button>
    </div>
  </form>
</div>
